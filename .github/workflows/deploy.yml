name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # Memicu deploy setiap ada push ke branch main

# Mengizinkan workflow ini melakukan deploy ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Folder output build Vite biasanya adalah 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/configure-pages@v5